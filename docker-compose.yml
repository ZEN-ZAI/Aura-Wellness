services:
  postgres-main:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aura_wellness
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: ${POSTGRES_MAIN_PASSWORD}
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura_user -d aura_wellness"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-chat:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aura_chat
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: ${POSTGRES_CHAT_PASSWORD}
    volumes:
      - postgres_chat_data:/var/lib/postgresql/data
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_user -d aura_chat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres-chat
      DB_PORT: "5432"
      DB_NAME: aura_chat
      DB_USER: chat_user
      DB_PASSWORD: ${POSTGRES_CHAT_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "50051"
      REDIS_ADDR: "redis:6379"
    depends_on:
      postgres-chat:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "50051:50051"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres-main;Port=5432;Database=aura_wellness;Username=aura_user;Password=${POSTGRES_MAIN_PASSWORD}"
      ConnectionStrings__ChatConnection: "Host=postgres-chat;Port=5432;Database=aura_chat;Username=chat_user;Password=${POSTGRES_CHAT_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,allowAdmin=true"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__ExpiryMinutes: "60"
      Jwt__Issuer: "aura-wellness"
      Jwt__Audience: "aura-wellness-client"
      ChatService__GrpcUrl: "http://chat-service:50051"
      ChatService__InternalApiKey: ${INTERNAL_API_KEY}
      DefaultStaffPassword: ${DEFAULT_STAFF_PASSWORD}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
    depends_on:
      postgres-main:
        condition: service_healthy
      chat-service:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "5001:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      CHAT_SERVICE_URL: http://chat-service:8080
      DEFAULT_STAFF_PASSWORD: ${DEFAULT_STAFF_PASSWORD}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - chat-service

volumes:
  postgres_main_data:
  postgres_chat_data:
